<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>담당 대리점 지도</title>
<meta name="theme-color" content="#02b350">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="대리점지도">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: 'Malgun Gothic', -apple-system, sans-serif; }
  body { display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }
  #topnav { min-height: 46px; background: #02b350; color: #fff; display: flex; align-items: center; padding: env(safe-area-inset-top) 14px 0; gap: 6px; flex-shrink: 0; }
  #topnav .brand { font-weight: 700; font-size: 15px; margin-right: 14px; }
  #topnav .navbtn { background: transparent; color: #d6ffe6; border: none; padding: 8px 14px; font-size: 14px; cursor: pointer; border-radius: 6px 6px 0 0; }
  #topnav .navbtn.active { background: #fff; color: #02b350; font-weight: 700; }
  #topnav .spacer { flex: 1; }
  #topnav .count2 { font-size: 12px; color: #eafff2; }
  #topnav .toolbtn-top { color: #fff; cursor: pointer; text-decoration: underline; }
  #topnav .toolbtn-top:hover { color: #d6ffe6; }
  .view { flex: 1; min-height: 0; }
  #app { display: flex; }
  #sidebar { width: 340px; min-width: 340px; display: flex; flex-direction: column; border-right: 1px solid #e3e3e3; background: #fafafa; height: 100%; }
  #map { flex: 1; height: 100%; }
  .shead { padding: 8px 14px; background: #f0f0f0; border-bottom: 1px solid #e3e3e3; font-size: 13px; font-weight: 600; color: #444; display: flex; align-items: center; gap: 8px; }
  .shead-btn { margin-left: auto; background: #02b350; color: #fff; border: none; border-radius: 6px; padding: 5px 10px; font-size: 11.5px; font-weight: 700; cursor: pointer; }
  .shead-btn:hover { background: #029544; }
  .shead { cursor: pointer; user-select: none; }
  .acc-ic { font-size: 11px; color: #666; transition: transform .2s; display: inline-block; }
  #app.panel-collapsed .acc-ic { transform: rotate(180deg); }
  #app.panel-collapsed #sidebar { display: none; }
  #sidebarBody { flex: 1; min-height: 0; display: flex; flex-direction: column; }
  .filters { padding: 10px 12px; border-bottom: 1px solid #e3e3e3; }
  .fgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px 8px; }
  .fgrid label { font-size: 11px; color: #666; display: block; margin-bottom: 2px; }
  .fgrid select { width: 100%; padding: 6px 6px; border: 1px solid #ccc; border-radius: 6px; font-size: 12px; background: #fff; }
  .fbtns { display: flex; gap: 6px; margin-top: 10px; }
  .btn-search { flex: 1; background: #02b350; color: #fff; border: none; padding: 9px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 700; }
  .btn-search:hover { background: #029544; }
  .btn-reset { background: #eee; border: 1px solid #ccc; border-radius: 6px; padding: 9px 14px; cursor: pointer; font-size: 13px; color: #555; }
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 10px; font-size: 11px; color: #555; }
  .legend i { display: inline-block; width: 11px; height: 11px; border-radius: 50%; margin-right: 4px; vertical-align: middle; border: 1px solid #fff; box-shadow: 0 0 1px rgba(0,0,0,.5); }
  #status { padding: 8px 12px; font-size: 12px; color: #555; background: #fff7e6; border-bottom: 1px solid #f0e0c0; }
  #status.done { background: #e8f9ee; }
  #list { flex: 1; overflow-y: auto; }
  .item { padding: 10px 12px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 13px; }
  .item:hover { background: #eef9f1; }
  .item .name { font-weight: 600; color: #111; }
  .item .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
  .item .meta { color: #777; font-size: 11px; margin-top: 2px; }
  .item .addr { color: #999; font-size: 11px; margin-top: 2px; }
  .item .stninfo { color: #0a7d3b; font-size: 11px; margin-top: 2px; }
  .item.fail { opacity: .5; }
  .iw { position: relative; padding: 10px 26px 10px 12px; font-size: 13px; max-width: 240px; line-height: 1.5; }
  .iw-close { position: absolute; top: 3px; right: 7px; cursor: pointer; color: #999; font-size: 17px; line-height: 1; font-weight: 700; }
  .iw-close:hover { color: #333; }
  .iw b { font-size: 14px; }
  .iw .tel a { color: #03c75a; text-decoration: none; }
  .count { font-size: 11px; color: #888; padding: 6px 12px; }
  .toolbtn { font-size: 11px; color: #03c75a; cursor: pointer; text-decoration: underline; }
  #view-list { display: none; flex-direction: column; }
  .list-toolbar { padding: 10px 14px; border-bottom: 1px solid #e3e3e3; background: #fafafa; display: flex; gap: 10px; align-items: center; font-size: 13px; }
  .list-toolbar input { padding: 6px 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 13px; width: 280px; }
  .list-toolbar .note { color: #888; font-size: 12px; }
  .table-wrap { flex: 1; overflow: auto; }
  table.agency { border-collapse: collapse; width: 100%; font-size: 13px; }
  table.agency th, table.agency td { border-bottom: 1px solid #eee; padding: 8px 10px; text-align: left; vertical-align: top; white-space: nowrap; }
  table.agency th { position: sticky; top: 0; background: #f4f7f5; color: #333; font-weight: 700; z-index: 1; }
  table.agency td.addr { white-space: normal; min-width: 280px; color: #555; }
  table.agency tr:hover td { background: #f3fbf6; }
  table.agency .stn { font-weight: 600; color: #0a7d3b; }
  table.agency .dist { color: #555; }
  table.agency .muted { color: #bbb; }
  .keybox { padding: 40px; max-width: 520px; margin: auto; }
  .keybox input { width: 100%; padding: 10px; font-size: 14px; margin: 10px 0; }
  .keybox button { padding: 10px 18px; background: #03c75a; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
  /* ===== 모바일 반응형 ===== */
  @media (max-width: 600px){
    #topnav { height: auto; min-height: 46px; flex-wrap: wrap; padding: calc(6px + env(safe-area-inset-top)) 10px 6px; gap: 4px 8px; }
    #topnav .brand { font-size: 14px; margin-right: 6px; }
    #topnav .navbtn { padding: 7px 12px; }
    #topnav .spacer { display: none; }
    #topnav .count2 { width: 100%; order: 5; font-size: 10.5px; margin-top: 2px; white-space: normal; }
    #app { flex-direction: column; }
    #sidebar { width: 100%; min-width: 0; height: auto; max-height: 46vh; border-right: none; border-bottom: 1px solid #e3e3e3; order: 2; }
    #map { order: 1; flex: 1; height: auto; min-height: 260px; }
    .list-toolbar { flex-wrap: wrap; }
    .list-toolbar input { width: 100%; }
    .fgrid select { font-size: 13px; padding: 8px 6px; }
    .shead-btn { padding: 6px 11px; font-size: 12px; }
    #sidebar { max-height: 48vh; }
    #sidebarBody { overflow-y: auto; }
    #list { flex: none; overflow: visible; }
    #app.panel-collapsed #sidebar { display: flex; max-height: none; }
    #app.panel-collapsed #sidebarBody { display: none; }
    .shead { background: #e9efe9; }
  }
  /* Z Fold4 커버(초협소) — 필터 1열 */
  @media (max-width: 400px){
    .fgrid { grid-template-columns: 1fr; }
    #topnav .brand { font-size: 13px; }
  }
  /* Z Fold4 메인(펼침)·소형 태블릿 — 좌우 배치 유지, 사이드바 약간 축소 */
  @media (min-width: 601px) and (max-width: 1100px){
    #sidebar { width: 300px; min-width: 300px; }
  }
</style>
</head>
<body>
<div id="topnav">
  <span class="brand">담당 대리점</span>
  <button class="navbtn active" id="navMap">지도보기</button>
  <button class="navbtn" id="navList">목록보기</button>
  <button class="navbtn" id="btnPanel" title="검색/필터 패널 보이기·숨기기">▤ 필터 숨기기</button>
  <button class="navbtn" id="btnParking" title="주차장 표시/숨기기">🅿 주차장</button>
  <button class="navbtn" id="btnMyLoc" title="현재 내 위치 표시">📍 내 위치</button>
  <span class="spacer"></span>
  <span class="count2">총 <span id="total">0</span>개 · Naver Maps · <span id="shown">0</span>개 표시 · <span class="toolbtn-top" id="changeKey">API 키 변경</span> · <span class="toolbtn-top" id="clearCache">캐시 초기화</span></span>
</div>

<div id="app" class="view">
  <div id="sidebar">
    <div class="shead" id="filterHead"><span class="acc-ic" id="accIc">▾</span>지점 검색 / 필터
      <button id="btnUpdateList" class="shead-btn" title="업데이트된 대리점 엑셀을 올려 목록 갱신">목록 업데이트</button>
      <input type="file" id="xlsxInput" accept=".xlsx,.xls,.csv" style="display:none">
    </div>
    <div id="sidebarBody">
    <div class="filters">
      <div class="fgrid">
        <div><label>대리점</label><select id="fAgency"><option value="">전체</option></select></div>
        <div><label>본부</label><select id="fHq"><option value="">전체</option></select></div>
        <div><label>지점명</label><select id="fBranch"><option value="">전체</option></select></div>
        <div><label>위촉설계사수</label><select id="fFp">
          <option value="">전체</option>
          <option value="lt5">5명 미만</option>
          <option value="5to9">5~9명</option>
          <option value="gte10">10명 이상</option>
        </select></div>
        <div><label>방문 여부</label><select id="fVisit">
          <option value="">전체</option>
          <option value="visited">방문</option>
          <option value="notvisited">미방문</option>
        </select></div>
        <div><label>지하철 호선</label><select id="fLine"><option value="">전체</option></select></div>
        <div><label>역명</label><select id="fStation"><option value="">전체</option></select></div>
      </div>
      <div class="fbtns">
        <button id="btnSearch" class="btn-search">검색하기</button>
        <button id="btnReset" class="btn-reset">초기화</button>
      </div>
      <div class="legend">
        <span><i style="background:#FF6D00;width:9px;height:9px"></i>5명 미만</span>
        <span><i style="background:#2962FF;width:13px;height:13px"></i>5~9명</span>
        <span><i style="background:#D81B60;width:16px;height:16px"></i>10명 이상</span>
      </div>
    </div>
    <div id="status">지도 로딩 중…</div>
    <div id="list"></div>
    </div>
  </div>
  <div id="map"></div>
</div>

<div id="view-list" class="view">
  <div class="list-toolbar">
    <input id="lSearch" placeholder="검색 (대리점·지점·주소·역)">
    <span class="note" id="lNote"></span>
  </div>
  <div class="table-wrap">
    <table class="agency">
      <thead>
        <tr>
          <th>#</th><th>대리점</th><th>본부</th><th>지점</th><th>주소</th><th>연락처</th>
          <th>위촉설계사</th><th>방문</th><th>개시일</th><th>가까운 역</th><th>직선거리</th>
        </tr>
      </thead>
      <tbody id="lBody"></tbody>
    </table>
  </div>
</div>

<script>
/* ===== 데이터 ===== */
const DEFAULT_AGENCIES = __DATA__;
function loadAgencies(){
  try { const o = JSON.parse(localStorage.getItem('agencies_data_v1') || 'null'); if (Array.isArray(o) && o.length) return o; } catch(e){}
  return DEFAULT_AGENCIES;
}
let AGENCIES = loadAgencies();

/* ===== 목록 업데이트 (엑셀 업로드) ===== */
const ADDR_FIXES = [['난계29가길','난계로29가길'],['오패산77길','오패산로77길'],['강남대로 84 길','강남대로84길']];
function normalizeAddr(a){
  if (!a) return '';
  a = String(a).trim().replace(/^\(\s*\d{3}-\d{2}\s*\)\s*/, '').replace(/\s+/g, ' ').trim();
  ADDR_FIXES.forEach(function(f){ a = a.split(f[0]).join(f[1]); });
  return a;
}
function ensureXLSX(cb){
  if (window.XLSX) return cb();
  const s = document.createElement('script');
  s.src = 'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
  s.onload = cb; s.onerror = function(){ alert('엑셀 라이브러리 로드 실패 — 인터넷 연결이 필요합니다.'); };
  document.head.appendChild(s);
}
function parseWorkbook(wb){
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, { header:1, raw:false, defval:'' });
  let hi = rows.findIndex(function(r){ return r.indexOf('주소') >= 0; });
  if (hi < 0) hi = 0;
  const H = rows[hi].map(function(x){ return String(x).trim(); });
  const c = { agency:H.indexOf('대리점명'), hq:H.indexOf('본부명'), branch:H.indexOf('지점명'), start:H.indexOf('개시일자'), fp:H.indexOf('위촉설계사'), tel:H.indexOf('연락처'), addr:H.indexOf('주소'), visits:H.indexOf('방문'), excl:H.indexOf('대상제외') };
  if (c.addr < 0) return [];
  const out = [];
  for (let i = hi+1; i < rows.length; i++){
    const r = rows[i]; if (!r) continue;
    const addr = normalizeAddr(r[c.addr]);
    if (!addr) continue;
    if (c.excl >= 0 && String(r[c.excl]||'').trim() === '1') continue;
    out.push({ agency:String(r[c.agency]||'').trim(), hq:String(r[c.hq]||'').trim(), branch:String(r[c.branch]||'').trim(),
               start:String(r[c.start]||'').slice(0,10), fp:Number(r[c.fp])||0, tel:String(r[c.tel]||'').trim(), addr:addr, visits:(c.visits>=0?(Number(r[c.visits])||0):0) });
  }
  return out;
}
function handleListFile(file){
  ensureXLSX(function(){
    const reader = new FileReader();
    reader.onload = function(e){
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type:'array' });
        const data = parseWorkbook(wb);
        if (!data.length){ alert('주소가 있는 데이터를 찾지 못했습니다. 엑셀 형식(대리점명·본부명·지점명·위촉설계사·연락처·주소)을 확인해주세요.'); return; }
        if (confirm('업데이트된 목록 ' + data.length + '곳을 반영할까요? (현재 ' + AGENCIES.length + '곳)')){
          applyNewList(data);
        }
      } catch(err){ alert('엑셀을 읽는 중 오류가 발생했습니다: ' + err.message); }
    };
    reader.readAsArrayBuffer(file);
  });
}
/* 지하철 역사 좌표: [{station, line, exit:null, lat, lng}, ...] */
const SUBWAY_EXITS = __EXITS__;
const PARKING = __PARKING__;

/* ===== API 키 ===== */
let NAVER_KEY = "__KEY__";
const KEY_PLACEHOLDER = "__" + "KEY__";
const AUTH_PARAMS = ['ncpClientId', 'ncpKeyId'];

function loadMapsScript(key, param){
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = "https://oapi.map.naver.com/openapi/v3/maps.js?" + param + "=" + key + "&submodules=geocoder";
    s.onload = resolve; s.onerror = () => reject(new Error('script load error'));
    document.head.appendChild(s);
  });
}
window.navermap_authFailure = function(){
  const idx = parseInt(localStorage.getItem('auth_param_idx') || '0', 10);
  if (idx + 1 < AUTH_PARAMS.length){ localStorage.setItem('auth_param_idx', String(idx + 1)); location.reload(); return; }
  localStorage.removeItem('auth_param_idx');
  document.getElementById('app').innerHTML =
    '<div class="keybox"><h2 style="color:#c00">인증 실패</h2>' +
    '<p style="color:#666;font-size:13px">구·신규 파라미터를 모두 시도했지만 실패했습니다.<br>' +
    '· <b>Web 서비스 URL</b>에 접속 주소(예: <code>http://localhost:5500</code>) 등록 여부<br>' +
    '· file://로 열지 않았는지 → 로컬 서버로 여세요<br>· 콘솔 Web Dynamic Map·Geocoding 이용 신청 여부<br>· 키 정확한지</p>' +
    '<button id="reKeyBtn">API 키 다시 입력</button></div>';
  const b = document.getElementById('reKeyBtn');
  if (b) b.addEventListener('click', () => showKeyForm('', localStorage.getItem('naver_key') || ''));
};

function setStatus(msg, done){ const el = document.getElementById('status'); if (!el) return; el.textContent = msg; el.className = done ? 'done' : ''; }

/* ===== 상태 ===== */
let map, infoWindow, geocodeCache = {};
const CACHE_KEY = 'agency_geocode_v1';
let markers = [];                 // 개별 대리점 레코드 {data, lat, lng, fail, nearest, group}
let groups = [];                  // 좌표 그룹 {lat, lng, members:[record], marker, bestFp}
let activeFilter = {};            // 검색하기 클릭 시점의 조건

function init(){
  try { geocodeCache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}'); } catch(e){ geocodeCache = {}; }
  map = new naver.maps.Map('map', { center: new naver.maps.LatLng(37.5828, 127.0107), zoom: 12 });
  infoWindow = new naver.maps.InfoWindow({ content: '', borderColor: '#03c75a', borderWidth: 2, anchorSize: new naver.maps.Size(10,10) });
  window.__closeInfo = function(){ if (infoWindow) infoWindow.close(); };
  document.getElementById('total').textContent = AGENCIES.length;
  buildFilters();
  bindFilters();
  bindNav();
  renderList();
  ensureGeocoderThen(function(){ geocodeAll(); });
}
function waitForGeocoder(timeoutMs){
  return new Promise(function(resolve){
    var start = Date.now();
    (function check(){
      if (window.naver && naver.maps && naver.maps.Service && naver.maps.Service.geocode){ resolve(true); return; }
      if (Date.now() - start > timeoutMs){ resolve(false); return; }
      setTimeout(check, 100);
    })();
  });
}

/* geocoder 준비 대기 + 1회 자동 재시도 (느린 네트워크·재로드 대응) */
function ensureGeocoderThen(cb){
  setStatus('geocoder 준비 중…', false);
  waitForGeocoder(20000).then(function(ok){
    if (ok) return cb();
    setStatus('geocoder 재시도 중…', false);
    var key = localStorage.getItem('naver_key') || '';
    var idx = parseInt(localStorage.getItem('auth_param_idx') || '0', 10);
    if (idx >= AUTH_PARAMS.length) idx = 0;
    loadMapsScript(key, AUTH_PARAMS[idx]).catch(function(){}).then(function(){
      waitForGeocoder(20000).then(function(ok2){
        if (ok2) return cb();
        setStatus('geocoder 로드 실패 — 네트워크 상태를 확인한 뒤 새로고침해 주세요.', false);
      });
    });
  });
}

/* 새 목록을 새로고침 없이 제자리 반영 */
function applyNewList(data){
  try { localStorage.setItem('agencies_data_v1', JSON.stringify(data)); } catch(e){}
  AGENCIES = data;
  if (infoWindow) infoWindow.close();
  groups.forEach(function(g){ if (g.marker) g.marker.setMap(null); });
  groups = []; markers = [];
  var fb = document.getElementById('failBox'); if (fb) fb.remove();
  document.getElementById('total').textContent = AGENCIES.length;
  activeFilter = {};
  ['fAgency','fHq','fBranch','fFp','fVisit','fLine','fStation'].forEach(function(id){ var e = document.getElementById(id); if (e) e.value = ''; });
  buildFilters();
  renderList();
  ensureGeocoderThen(function(){ geocodeAll(); });
}

/* ===== 위촉설계사수 구간 & 색상 ===== */
function fpBucket(fp){ fp = fp || 0; return fp >= 10 ? 'gte10' : (fp >= 5 ? '5to9' : 'lt5'); }
function fpColor(fp){ const b = fpBucket(fp); return b === 'gte10' ? '#D81B60' : (b === '5to9' ? '#2962FF' : '#FF6D00'); }
function fpSize(fp){ const b = fpBucket(fp); return b === 'gte10' ? 30 : (b === '5to9' ? 25 : 20); }
function pinSVG(color, w, h){
  return '<svg width="' + w + '" height="' + h + '" viewBox="0 0 24 32" xmlns="http://www.w3.org/2000/svg">' +
    '<path d="M12 0 C5.9 0 1 4.9 1 11 C1 18.7 12 32 12 32 C12 32 23 18.7 23 11 C23 4.9 18.1 0 12 0 Z" fill="' + color + '" stroke="#ffffff" stroke-width="2"/>' +
    '<circle cx="12" cy="11" r="4.6" fill="#ffffff"/></svg>';
}
function makeIcon(fp, count){
  const h = fpSize(fp), w = Math.round(h * 24 / 32);
  var badge = '';
  if (count && count > 1){
    badge = '<div style="position:absolute;top:-6px;right:-9px;min-width:17px;height:17px;padding:0 3px;background:#111;color:#fff;border:1.5px solid #fff;border-radius:9px;font-size:10px;line-height:14px;text-align:center;font-weight:700;box-shadow:0 1px 2px rgba(0,0,0,.4)">' + count + '</div>';
  }
  var content = '<div style="position:relative;width:' + w + 'px;height:' + h + 'px">' + pinSVG(fpColor(fp), w, h) + badge + '</div>';
  return { content: content, anchor: new naver.maps.Point(Math.round(w/2), h) };

/* ===== 지오코딩 ===== */
async function geocodeAll(){
  let done = 0, fromApi = 0;
  const queue = AGENCIES.slice();
  const CONCURRENCY = 5;
  async function worker(){
    while (queue.length){
      const a = queue.shift();
      let pos = geocodeCache[a.addr];
      if (!pos){ pos = await geocodeOne(a.addr); if (pos){ geocodeCache[a.addr] = pos; fromApi++; } }
      addMarker(a, pos);
      done++;
      const failSoFar = markers.filter(m => m.fail).length;
      setStatus("지오코딩 " + done + "/" + AGENCIES.length + " (신규 " + fromApi + ", 실패 " + failSoFar + ")…", false);
    }
  }
  const workers = [];
  for (let i = 0; i < CONCURRENCY; i++) workers.push(worker());
  await Promise.all(workers);
  localStorage.setItem(CACHE_KEY, JSON.stringify(geocodeCache));
  const failN = markers.filter(m => m.fail).length;
  setStatus("완료 · " + (markers.length-failN) + "개 표시, 실패 " + failN + "개" + (failN?" (주소 확인 필요)":""), true);
  buildGroups();
  buildStationFilters();
  fitToShown();
  render();
  showFailures();
  renderList();
}

/* ===== 좌표 그룹핑 (같은 위치 = 마커 1개 + 배지) ===== */
function coordKey(lat, lng){ return lat.toFixed(5) + ',' + lng.toFixed(5); }
function buildGroups(){
  groups.forEach(function(g){ if (g.marker) g.marker.setMap(null); });
  groups = [];
  var byKey = {};
  markers.forEach(function(m){
    if (m.fail){ m.group = null; return; }
    var k = coordKey(m.lat, m.lng);
    var g = byKey[k];
    if (!g){ g = { lat:m.lat, lng:m.lng, members:[], marker:null }; byKey[k] = g; groups.push(g); }
    g.members.push(m); m.group = g;
  });
  groups.forEach(function(g){
    var bestFp = Math.max.apply(null, g.members.map(function(m){ return m.data.fp || 0; }));
    g.bestFp = bestFp;
    var marker = new naver.maps.Marker({ position: new naver.maps.LatLng(g.lat, g.lng), map: map, title: g.members[0].data.branch, icon: makeIcon(bestFp, g.members.length), zIndex: bestFp });
    naver.maps.Event.addListener(marker, 'click', (function(gr){ return function(){ openGroupInfo(gr); }; })(g));
    g.marker = marker;
  });
}

/* ===== 공통 주소 계산 ===== */
function commonAddr(addrs){
  if (!addrs.length) return '';
  var p = addrs[0];
  for (var i = 1; i < addrs.length; i++){
    var s = addrs[i], j = 0;
    while (j < p.length && j < s.length && p[j] === s[j]) j++;
    p = p.slice(0, j); if (!p) break;
  }
  var ci = Math.max(p.lastIndexOf(' '), p.lastIndexOf(','));
  if (ci > 3) p = p.slice(0, ci);
  return p.replace(/[,\s]+$/, '');
}

let parkingMarkers = [], parkingOn = false, parkingIdle = null;

function won(v){ v = String(v||'').replace(/[^0-9]/g, ''); return v && v !== '0' ? Number(v).toLocaleString() + '원' : ''; }

/* ===== 내 위치 ===== */
let myLocMarker = null;
function myLocIcon(){
  return { content: '<div style="position:relative;width:22px;height:22px"><div style="position:absolute;inset:0;border-radius:50%;background:rgba(26,115,232,.22)"></div><div style="position:absolute;left:5px;top:5px;width:12px;height:12px;border-radius:50%;background:#1a73e8;border:2px solid #fff;box-shadow:0 0 3px rgba(0,0,0,.4)"></div></div>', anchor: new naver.maps.Point(11, 11) };
}
function locateMe(){
  if (!navigator.geolocation){ alert('이 브라우저는 위치 기능을 지원하지 않습니다.'); return; }
  setStatus('내 위치 확인 중…', false);
  navigator.geolocation.getCurrentPosition(function(pos){
    var ll = new naver.maps.LatLng(pos.coords.latitude, pos.coords.longitude);
    if (!myLocMarker){ myLocMarker = new naver.maps.Marker({ position: ll, map: map, icon: myLocIcon(), zIndex: 1000, title: '내 위치' }); }
    else { myLocMarker.setPosition(ll); myLocMarker.setMap(map); }
    map.setCenter(ll); map.setZoom(Math.max(map.getZoom(), 15));
    setStatus('내 위치를 표시했습니다.', true);
  }, function(err){
    alert('위치를 가져오지 못했습니다: ' + (err.code===1?'위치 권한이 거부되었습니다':err.message) + '\n(HTTPS 접속과 위치 권한 허용이 필요합니다)');
    setStatus('내 위치 확인 실패', false);
  }, { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 });
}
function geocodeOne(addr){
  return new Promise(resolve => {
    let settled = false;
    const finish = (v) => { if (!settled){ settled = true; resolve(v); } };
    const timer = setTimeout(() => finish(null), 10000);
    try {
      naver.maps.Service.geocode({ query: addr }, (st, res) => {
        clearTimeout(timer);
        if (st !== naver.maps.Service.Status.OK || !res || !res.v2 || !res.v2.addresses || !res.v2.addresses.length){ finish(null); return; }
        const r = res.v2.addresses[0];
        finish({ lat: parseFloat(r.y), lng: parseFloat(r.x) });
      });
    } catch(e){ clearTimeout(timer); finish(null); }
  });
}
function addMarker(a, pos){
  if (!pos){ markers.push({ data:a, fail:true, nearest:null, group:null }); return; }
  markers.push({ data:a, lat:pos.lat, lng:pos.lng, fail:false, nearest: nearestStation(pos.lat, pos.lng), group:null });
}
function openGroupInfo(group){
  var members = group.members.filter(matchFilter);

  } else {

    html += '<b>' + a.branch + '</b><br><span style="color:#03c75a">' + a.agency + '</span> · ' + (a.hq||'') + '<br>' + a.addr + '<br>' + tel + stn +
      '<div style="color:#999;font-size:11px;margin-top:4px">위촉설계사 ' + (a.fp||0) + '명 · 방문 ' + (a.visits||0) + '회 · 개시 ' + a.start + '</div>';
  }
  html += '</div>';

  map.panTo(group.marker.getPosition());

/* ===== 지도 사이드바 렌더 (activeFilter 적용) ===== */
function matchFilter(m){
  const f = activeFilter || {};
  const a = m.data;
  if (f.agency && a.agency !== f.agency) return false;
  if (f.hq && a.hq !== f.hq) return false;
  if (f.branch && a.branch !== f.branch) return false;
  if (f.fp && fpBucket(a.fp) !== f.fp) return false;
  if (f.visit === 'visited' && !((a.visits||0) > 0)) return false;
  if (f.visit === 'notvisited' && ((a.visits||0) > 0)) return false;
  if (f.line && !(m.nearest && m.nearest.line === f.line)) return false;
  if (f.station && !(m.nearest && m.nearest.station === f.station)) return false;
  return true;
}
function render(){
  const list = document.getElementById('list');
  list.innerHTML = '';
  let shown = 0;
  groups.forEach(function(g){
    var matched = g.members.filter(matchFilter);
    if (!matched.length){ g.marker.setMap(null); return; }
    g.marker.setMap(map);
    var bestFp = Math.max.apply(null, matched.map(function(m){ return m.data.fp || 0; }));
    g.marker.setIcon(makeIcon(bestFp, matched.length));
    g.marker.setZIndex(bestFp);
  });
  markers.forEach(m => {
    const a = m.data;
    if (!matchFilter(m)) return;
    shown++;
    const stn = m.nearest ? ('가까운 역: ' + m.nearest.station + (m.nearest.line?(' '+m.nearest.line):'') + ' · 약 ' + m.nearest.dist + 'm') : '';
    const div = document.createElement('div');
    div.className = 'item' + (m.fail?' fail':'');
    div.innerHTML = '<div class="name"><span class="dot" style="background:' + fpColor(a.fp) + '"></span>' + a.branch + '</div>' +
      '<div class="meta">' + a.agency + ' · 위촉 ' + (a.fp||0) + '명 · 방문 ' + (a.visits||0) + '회 · ' + (a.tel||'연락처 없음') + '</div>' +
      '<div class="addr">' + a.addr + (m.fail?' (주소변환 실패)':'') + '</div>' +
      (stn ? '<div class="stninfo">' + stn + '</div>' : '');
    if (!m.fail && m.group) div.addEventListener('click', (function(gr){ return function(){ openGroupInfo(gr); }; })(m.group));
    list.appendChild(div);
  });
  document.getElementById('shown').textContent = shown;
}
function showFailures(){
  const old = document.getElementById('failBox'); if (old) old.remove();
  const fails = markers.filter(m => m.fail);
  if (!fails.length) return;
  const div = document.createElement('div');

  div.innerHTML = '<b>지오코딩 실패 ' + fails.length + '건</b><br>' + fails.map((m,i)=>(i+1)+'. '+m.data.branch).join('<br>');

function fitToShown(){
  if (!groups.length) return;
  const b = new naver.maps.LatLngBounds(groups[0].marker.getPosition(), groups[0].marker.getPosition());
  groups.forEach(function(g){ b.extend(g.marker.getPosition()); });

}
function fitVisible(){
  const vis = groups.filter(function(g){ return g.marker && g.marker.getMap(); });
  if (!vis.length) return;
  const b = new naver.maps.LatLngBounds(vis[0].marker.getPosition(), vis[0].marker.getPosition());
  vis.forEach(function(g){ b.extend(g.marker.getPosition()); });
  map.fitBounds(b);
}

/* ===== 최근접 역 (haversine 직선거리) ===== */
function haversine(la1, lo1, la2, lo2){
  const R = 6371000, toRad = d => d*Math.PI/180;
  const dLa = toRad(la2-la1), dLo = toRad(lo2-lo1);
  const x = Math.sin(dLa/2)**2 + Math.cos(toRad(la1))*Math.cos(toRad(la2))*Math.sin(dLo/2)**2;
  return 2*R*Math.asin(Math.sqrt(x));
}
function nearestStation(lat, lng){
  if (!SUBWAY_EXITS || !SUBWAY_EXITS.length) return null;
  let best = null, bestD = Infinity;
  for (const e of SUBWAY_EXITS){ const d = haversine(lat, lng, e.lat, e.lng); if (d < bestD){ bestD = d; best = e; } }
  if (!best) return null;
  return { station: best.station, line: best.line || '', dist: Math.round(bestD) };
}

/* ===== 목록 보기 테이블 ===== */

                              : AGENCIES.map(a => ({ a:a, fail:false, near:null }));
  let n = 0, html = '';
  rows.forEach(r => {
    const a = r.a;
    if (q && !(a.branch+a.agency+(a.hq||'')+a.addr+(r.near?r.near.station:'')).toLowerCase().includes(q)) return;
    n++;
    let stn, dist;
    if (r.fail){ stn = '<span class="muted">주소변환 실패</span>'; dist = '—'; }
    else if (!haveStn){ stn = '<span class="muted">역 데이터 추가 필요</span>'; dist = '—'; }
    else if (r.near){ stn = '<span class="stn">' + r.near.station + (r.near.line?(' ('+r.near.line+')'):'') + '</span>'; dist = '<span class="dist">약 ' + r.near.dist + 'm</span>'; }
    else { stn = '<span class="muted">계산 중</span>'; dist = '—'; }
    html += '<tr><td>' + n + '</td><td>' + a.agency + '</td><td>' + (a.hq||'') + '</td><td>' + a.branch + '</td>' +
            '<td class="addr">' + a.addr + '</td><td>' + (a.tel||'-') + '</td>' +
            '<td>' + (a.fp||0) + '</td><td>' + (a.visits||0) + '</td><td>' + (a.start||'') + '</td>' +
            '<td>' + stn + '</td><td>' + dist + '</td></tr>';
  });
  body.innerHTML = html;
  const note = document.getElementById('lNote');
  if (note) note.textContent = n + '개' + (haveStn ? ' · 직선거리는 역사 중심 기준' : '');
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

/* ===== PWA 서비스워커 ===== */
if ('serviceWorker' in navigator) { window.addEventListener('load', function(){ navigator.serviceWorker.register('sw.js').catch(function(){}); }); }

/* ===== 부트스트랩 ===== */
(function boot(){
  const saved = localStorage.getItem('naver_key');
  if (NAVER_KEY && NAVER_KEY !== KEY_PLACEHOLDER) localStorage.setItem('naver_key', NAVER_KEY);
  const key = (NAVER_KEY && NAVER_KEY !== KEY_PLACEHOLDER) ? NAVER_KEY : saved;
  if (!key){ showKeyForm(); return; }
  let idx = parseInt(localStorage.getItem('auth_param_idx') || '0', 10);
  if (idx >= AUTH_PARAMS.length){ idx = 0; localStorage.setItem('auth_param_idx', '0'); }
  loadMapsScript(key, AUTH_PARAMS[idx]).then(init).catch(function(){ showKeyForm('스크립트 로드 실패. 키를 다시 확인하세요.', key); });
})();

function showKeyForm(err, prefill){
  var val = (prefill || '').replace(/"/g, '&quot;');
  document.getElementById('app').innerHTML =
    '<div class="keybox"><h2>Naver Maps API 키 설정</h2>' +
    '<p style="color:#666;font-size:13px">NCP 콘솔에서 발급한 <b>Maps Client ID</b>를 입력하세요. 구·신규 콘솔 키 모두 자동 인식합니다.</p>' +
    (err ? '<p style="color:#c00">' + err + '</p>' : '') +
    '<input id="keyInput" placeholder="예: abcd1234efgh" value="' + val + '">' +
    '<button id="saveKeyBtn">저장하고 시작</button> ' +
    (prefill ? '<button id="cancelKeyBtn" style="background:#999">취소</button>' : '') + '</div>';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('saveKeyBtn').addEventListener('click', function(){
    var k = document.getElementById('keyInput').value.trim();
    localStorage.setItem('auth_param_idx', '0');
    if (k) localStorage.setItem('naver_key', k); else localStorage.removeItem('naver_key');
    location.reload();
  });
  var cancel = document.getElementById('cancelKeyBtn');
  if (cancel) cancel.addEventListener('click', function(){ location.reload(); });
}
</script>
